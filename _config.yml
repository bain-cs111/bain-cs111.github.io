# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "COMP_SCI 111: Fall 2021"
subtitle: "Fundamentals of Computer Programming 1"
email: connor.bain@northwestern.edu
description: >- # this means to ignore newlines until "baseurl:"
term_start_date: "2022-09-19"
url: "bain-cs111.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username:
campuswire_url: https://campuswire.com/p/G7C57BC09

timezone: "America/Chicago"
# Build settings
markdown: kramdown
theme: minima
exclude:
  - course-files/solutions
  - _lectures/draft
  - _assignments/draft
  - course-files/administrative
  - course-files/build
  - course-files/exams
  - course-files/homework/drafts
  - course-files/tutorials/drafts
  - course-files/lectures/drafts
  - course-files/practice_exams/drafts
  - course-files/projects/drafts
collections:
  assignments:
    output: true
    sort_by: ordering
    permalink: /assignments/:name
  lectures:
    output: true
    sort_by: lecture_date
    permalink: /lectures/:name

collections_dir: pages

sass:
  style: compact
  sass_dir: _sass

deadline_reminder: true
